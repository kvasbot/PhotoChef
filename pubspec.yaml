name: photochef
description: PhotoChef - AI-powered recipe finder app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Supabase
  supabase_flutter: ^2.0.0
  
  # Navigation
  go_router: ^13.0.0
  
  # Image Picker
  image_picker: ^1.0.7
  image: ^4.1.3
  
  # UI Components
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  
  # HTTP & JSON
  http: ^1.2.0
  dio: ^5.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.2
  
  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/



























